
name: SOXL 매매 알림 봇

on:
  schedule:
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    
    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v3
    
    - name: Python 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 패키지 설치
      run: |
        pip install yfinance requests pytz
    
    - name: 알림 봇 실행
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: |
        python soxl_alert_bot.py
